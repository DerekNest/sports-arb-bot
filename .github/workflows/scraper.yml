name: Money Printer

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest history before running
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Arbitrage Scanner
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          BETTINGPROS_API_KEY: ${{ secrets.BETTINGPROS_API_KEY }}
        run: python main.py

      - name: Commit and Push History
        run: |
          git pull --rebase origin main
          touch arb_history.json
          git add arb_history.json
          git diff-index --quiet HEAD || git commit -m "Update arb history [skip ci]"
          git push
